<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E&B Board Evaluation Platform — Work Breakdown Structure</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#f5f4f1;color:#2c2c2a;min-height:100vh;padding:2rem 1rem}
.page{max-width:1500px;margin:0 auto}
.header{text-align:center;margin-bottom:1.5rem}
.header h1{font-size:21px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.header p{font-size:13px;color:#999;line-height:1.5;max-width:700px;margin:0 auto}

.stats{display:flex;justify-content:center;gap:12px;margin-bottom:2rem;flex-wrap:wrap}
.stat{background:#fff;border:1px solid #e8e6e1;border-radius:8px;padding:10px 20px;text-align:center}
.stat .num{font-size:22px;font-weight:600;color:#1a1a1a}
.stat .lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.5px}

.tree-container{overflow-x:auto;padding-bottom:1rem}
.tree{position:relative;display:flex;flex-direction:column;align-items:center;min-width:1100px;padding:0 1rem}
.tree svg.lines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.tree svg.lines line{stroke:#ccc;stroke-width:1.5}

.root-row{display:flex;justify-content:center;margin-bottom:0;position:relative;z-index:1}
.root{background:#2c2c2a;color:#fff;padding:12px 28px;border-radius:8px;font-size:15px;font-weight:600;text-align:center}

.seq-hint{text-align:center;margin-top:8px;margin-bottom:0;font-size:11px;color:#bbb;letter-spacing:.3px}

.layer-row{display:flex;justify-content:center;gap:14px;position:relative;z-index:1;margin-top:40px;align-items:flex-start}
